<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Anniversary ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 💖 Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="hearts"></div>

<div class="container">

  <!-- Landing Screen -->
  <div id="start-screen" class="card active">
    <h1>to the best 32 months of your life 🌠</h1>
    <p>
      made something special for my baby…  
      going beyond my capabilities just for you ❤️  
      hope you like it 😘
    </p>
    <button onclick="startQuiz()">START</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="card">
    <div id="progress"></div>
    <p style="font-size: 14px; opacity: 0.8;">let’s see how well you know us 👀</p>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button id="next-btn" onclick="nextQuestion()">NEXT</button>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="card">
    <h2 id="score-text"></h2>
    <p id="message"></p>
    <p class="love">
      love my baby even when he is mute 🫣🥰  
    </p>
    <button onclick="restartQuiz()">PLAY AGAIN</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
