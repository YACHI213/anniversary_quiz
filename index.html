<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Anniversary ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="hearts"></div>
<div class="container">

  <!-- Landing Screen -->
  <div id="start-screen" class="card active">
    <h1>to the best 32 months of your life🌠</h1>
    <p> made something special for my baby going beyond my capabalities hope you like it 😘</p>
    <button onclick="startQuiz()">START</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="card">
    <div id="progress"></div>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button id="next-btn" onclick="nextQuestion()">NEXT</button>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="card">
    <h2 id="score-text"></h2>
    <p id="message"></p>
    <p class="love">love my baby weven when he is mute🫣🥰</p>
    <button onclick="restartQuiz()">PLAY AGAIN</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
